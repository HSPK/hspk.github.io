site_name: Hangxing Wei
site_description: Research Intern @ MSRA
site_url: https://hspk.github.io/

theme:
  name: material
  language: en
  favicon: assets/favicon.svg
  font: false
  features:
    - navigation.top
  palette:
    - media: "(prefers-color-scheme)"
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-auto
        name: Follow system theme
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark theme
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system theme

nav:
  - About: index.md
  - Publications: publications.md
  - CV: cv.md

plugins: []

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences

extra_css:
  - assets/stylesheets/common.css
  - assets/stylesheets/home.css
  - assets/stylesheets/entries.css

extra:
  generator: false
